name: Build and Deploy Love2D to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t love-builder .

      - name: Build all games
        run: |
          for game in */; do
            game="${game%/}"

            if [ -f "$game/makelove.toml" ]; then
              echo "Building $game"

              docker run --rm \
                -v "${{ github.workspace }}/$game:/game" \
                love-builder \
                makelove lovejs
            fi
          done

      - name: Assemble static site
        run: |
          rm -rf site
          mkdir -p site

          cat > site/index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>CS50 Games</title>
          </head>
          <body>
            <h1>CS50 Game Collection</h1>
            <ul>
          EOF

          for game in */; do
            game="${game%/}"

            if [ -f "$game/makelove.toml" ]; then
              slug="${game#*-}"   # 0-pong -> pong

              echo "<li><a href=\"$slug/\">$slug</a></li>" >> site/index.html

              mkdir -p "site/$slug"

              unzip -q "$game"/makelove-build/lovejs/*.zip \
                -d "site/$slug"

              root=$(find "site/$slug" -mindepth 1 -maxdepth 1 -type d | head -n 1)

              if [ -n "$root" ]; then
                mv "$root"/* "site/$slug/"
                rmdir "$root"
              fi
            fi
          done

          cat >> site/index.html <<EOF
            </ul>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
